{% extends 'forum/base.html' %}
{% block title %}Giriş Yap - DevForum{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-stack fs-1 text-primary"></i>
                        <h3 class="mt-2">DevForum'a Giriş Yap</h3>
                        <p class="text-muted">Hesabınıza giriş yaparak devam edin</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Kullanıcı adı veya e-posta</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Şifre</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" name="password" id="password" class="form-control" required>
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()"><i class="bi bi-eye" id="toggleIcon"></i></button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">Giriş Yap</button>
                    </form>
                    <div class="text-center mt-3">
                        <span class="text-muted">Hesabınız yok mu?</span>
                        <a href="{% url 'kayit' %}" class="text-decoration-none fw-semibold">Kayıt Olun</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.getElementById('toggleIcon');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.classList.toggle('bi-eye');
    icon.classList.toggle('bi-eye-slash');
}
</script>
{% endblock %}
