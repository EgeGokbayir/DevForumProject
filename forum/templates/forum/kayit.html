{% extends 'forum/base.html' %}
{% block title %}Kayıt Ol - DevForum{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-stack fs-1 text-primary"></i>
                        <h3 class="mt-2">DevForum'a Katılın</h3>
                        <p class="text-muted">Ücretsiz bir hesap oluşturun</p>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3"><label class="form-label">Kullanıcı Adı</label><input type="text" name="username" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">E-posta</label><input type="email" name="email" class="form-control" required></div>
                        <div class="mb-3"><label class="form-label">Şifre</label><input type="password" name="password" class="form-control" required></div>
                        <div class="mb-4"><label class="form-label">Şifre Tekrar</label><input type="password" name="password2" class="form-control" required></div>
                        <div class="form-check mb-4"><input class="form-check-input" type="checkbox" required id="agree"><label class="form-check-label" for="agree">Kullanım şartlarını kabul ediyorum.</label></div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">Kayıt Ol</button>
                    </form>
                    <div class="text-center mt-3"><span class="text-muted">Zaten hesabınız var mı?</span> <a href="{% url 'giris' %}" class="text-decoration-none fw-semibold">Giriş Yapın</a></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
